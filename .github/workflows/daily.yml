name: Daily Space Shorts Agent

on:
  schedule:
    - cron: "0 7 * * *" # Every day at 7:00 AM UTC (9:00 AM Jordan time)
  workflow_dispatch: # Also allows manual trigger

# Never run two uploads at once (e.g. schedule + manual overlap).
concurrency:
  group: space-shorts
  cancel-in-progress: false

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install FFmpeg + caption fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Download background video
        run: curl -L "https://download.samplelib.com/mp4/sample-5s.mp4" -o background.mp4

      - name: Write secrets to local files
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          CLIENT_SECRETS: ${{ secrets.CLIENT_SECRETS }}
        run: |
          printf 'GROQ_API_KEY=%s\n' "$GROQ_API_KEY" > .env
          printf '%s' "$YOUTUBE_TOKEN" > token.json
          printf '%s' "$CLIENT_SECRETS" > client_secrets.json

      - name: Run agent (generates + uploads in one pass)
        run: python agent.py
